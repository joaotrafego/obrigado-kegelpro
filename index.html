  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #0e0e0e;
      --surface: #161616;
      --border: rgba(255,255,255,0.08);
      --gold: #c9a96e;
      --gold-light: #e5c99a;
      --text: #f0ece4;
      --muted: rgba(240,236,228,0.5);
    }

    html, body {
      height: 100%;
      background: var(--bg);
      color: var(--text);
      font-family: 'DM Sans', sans-serif;
      font-weight: 300;
      -webkit-font-smoothing: antialiased;
    }

    body {
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      padding: 2rem;
      position: relative;
      overflow: hidden;
    }

    body::before {
      content: '';
      position: fixed;
      top: -20%;
      left: 50%;
      transform: translateX(-50%);
      width: 600px;
      height: 600px;
      background: radial-gradient(ellipse, rgba(201,169,110,0.12) 0%, transparent 70%);
      pointer-events: none;
      z-index: 0;
    }

    body::after {
      content: '';
      position: fixed;
      bottom: -10%;
      right: -10%;
      width: 400px;
      height: 400px;
      background: radial-gradient(ellipse, rgba(201,169,110,0.06) 0%, transparent 70%);
      pointer-events: none;
      z-index: 0;
    }

    .card {
      position: relative;
      z-index: 1;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 20px;
      padding: 3.5rem 3rem;
      max-width: 520px;
      width: 100%;
      text-align: center;
      animation: fadeUp 0.8s cubic-bezier(0.22, 1, 0.36, 1) both;
    }

    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(32px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    .card::before {
      content: '';
      position: absolute;
      top: 0; left: 10%; right: 10%;
      height: 1px;
      background: linear-gradient(90deg, transparent, var(--gold), transparent);
      border-radius: 1px;
    }

    .logo-wrap {
      display: flex;
      justify-content: center;
      margin-bottom: 2.5rem;
      animation: fadeUp 0.8s 0.1s cubic-bezier(0.22, 1, 0.36, 1) both;
    }

    .logo-wrap img {
      height: 56px;
      width: auto;
      filter: brightness(1.4) contrast(0.85);
    }

    .check-icon {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      width: 64px;
      height: 64px;
      border-radius: 50%;
      border: 1px solid rgba(201,169,110,0.3);
      background: rgba(201,169,110,0.08);
      margin-bottom: 1.75rem;
      animation: fadeUp 0.8s 0.2s cubic-bezier(0.22, 1, 0.36, 1) both;
    }

    .check-icon svg {
      width: 28px;
      height: 28px;
      stroke: var(--gold);
      fill: none;
      stroke-width: 2;
      stroke-linecap: round;
      stroke-linejoin: round;
    }

    .label {
      font-family: 'DM Sans', sans-serif;
      font-size: 0.7rem;
      font-weight: 500;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      color: var(--gold);
      margin-bottom: 0.75rem;
      animation: fadeUp 0.8s 0.25s cubic-bezier(0.22, 1, 0.36, 1) both;
    }

    h1 {
      font-family: 'Cormorant Garamond', serif;
      font-weight: 300;
      font-size: clamp(2rem, 5vw, 2.6rem);
      line-height: 1.2;
      color: var(--text);
      margin-bottom: 1.25rem;
      animation: fadeUp 0.8s 0.3s cubic-bezier(0.22, 1, 0.36, 1) both;
    }

    .divider {
      width: 48px;
      height: 1px;
      background: linear-gradient(90deg, transparent, var(--gold), transparent);
      margin: 0 auto 1.25rem;
      animation: fadeUp 0.8s 0.35s cubic-bezier(0.22, 1, 0.36, 1) both;
    }

    p {
      font-size: 0.9rem;
      line-height: 1.75;
      color: var(--muted);
      margin-bottom: 0.6rem;
      animation: fadeUp 0.8s 0.4s cubic-bezier(0.22, 1, 0.36, 1) both;
    }

    p strong {
      color: var(--text);
      font-weight: 400;
    }

    .email-note {
      display: inline-flex;
      align-items: center;
      gap: 0.4rem;
      font-size: 0.78rem;
      color: var(--muted);
      background: rgba(201,169,110,0.07);
      border: 1px solid rgba(201,169,110,0.15);
      border-radius: 8px;
      padding: 0.5rem 0.9rem;
      margin: 0.75rem 0 2rem;
      animation: fadeUp 0.8s 0.45s cubic-bezier(0.22, 1, 0.36, 1) both;
    }

    .email-note svg {
      width: 14px;
      height: 14px;
      stroke: var(--gold);
      fill: none;
      stroke-width: 1.8;
      flex-shrink: 0;
    }

    .btn {
      display: inline-block;
      width: 100%;
      padding: 1rem 2rem;
      background: var(--gold);
      color: #0e0e0e;
      font-family: 'DM Sans', sans-serif;
      font-size: 0.85rem;
      font-weight: 500;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      text-decoration: none;
      border-radius: 10px;
      transition: background 0.25s, transform 0.2s;
      animation: fadeUp 0.8s 0.5s cubic-bezier(0.22, 1, 0.36, 1) both;
    }

    .btn:hover {
      background: var(--gold-light);
      transform: translateY(-2px);
    }

    .btn:active {
      transform: translateY(0);
    }

    .footer-note {
      margin-top: 1.75rem;
      font-size: 0.72rem;
      color: rgba(240,236,228,0.25);
      letter-spacing: 0.04em;
      animation: fadeUp 0.8s 0.55s cubic-bezier(0.22, 1, 0.36, 1) both;
    }
  </style>
